name: Discord - PR Opened

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
    branches: [develop, main]

jobs:
  notify:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_AUTHOR_AVATAR: ${{ github.event.pull_request.user.avatar_url }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
        run: |
          payload=$(jq -n \
            --arg title "📥 새 PR이 올라왔어요" \
            --arg name "#${PR_NUMBER} ${PR_TITLE}" \
            --arg value "👤 작성자: **${PR_AUTHOR}**  |  🌿 \`${PR_HEAD}\` → \`${PR_BASE}\`\n🔗 ${PR_URL}" \
            --arg author "$PR_AUTHOR" \
            --arg avatar "$PR_AUTHOR_AVATAR" \
            --arg url "$PR_URL" \
            '{
              username: "GitHub PR Bot",
              embeds: [{
                title: $title,
                url: $url,
                color: 3447003,
                author: { name: $author, icon_url: $avatar },
                fields: [
                  { name: $name, value: $value, inline: false }
                ]
              }]
            }')
          curl -sSf -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_WEBHOOK_URL"
