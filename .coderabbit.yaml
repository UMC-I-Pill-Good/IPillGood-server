language: 'ko-KR'
early_access: false

reviews:
  profile: 'chill'
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  instructions: |
    아래 팀 컨벤션을 참고하여 코드 리뷰를 진행합니다.
    
    [네이밍 규칙]
    - 클래스/인터페이스: PascalCase
    - 메서드/변수/필드: camelCase
    - 상수: UPPER_SNAKE_CASE
    - 패키지: 전부 소문자 (언더스코어 X)
    - 약어는 한 단어처럼 취급, 첫 글자만 대문자: userDto (O), userDTO (X) / httpClient (O), HTTPClient (X)
    - 계층 접미사 필수: Controller, Service, Repository

    [DTO]
    - DTO는 도메인별로 XxxRequest(요청), XxxResponse(응답) 컨테이너를 분리하고, 그 안에 중첩 record로 정의
    - DTO 클래스명 표기: SignUpDto (O), SignUpDTO (X)

    [API 응답]
    - 모든 컨트롤러 응답은 ApiResponse<T>로 감싸야 한다
    - onSuccess(...) / onFailure(...) 정적 팩토리 메서드를 사용한다

    [예외 처리]
    - 컨트롤러/서비스에서 try-catch로 직접 응답 생성 금지
    - 반드시 throw로 예외를 던져 GlobalExceptionHandler에서 처리
    - 에러 코드/메시지는 enum으로 관리

    [URL 규칙]
    - 모든 API는 /api/v1/로 시작
    - 리소스는 소문자 복수형 명사: /api/v1/users (O), /api/getUser (X)
    - URL에 동사 사용 금지 (HTTP Method로 표현 불가한 경우 예외)

    [패키지 구조]
    - 도메인형 구조: domain/{도메인}/controller, service, repository, entity, dto, converter, code, exception
    - 공통 코드는 global/ 하위: apiPayload, config, entity 등

    [커밋 메시지]
    - 형식: <타입>: <한글 설명> (예: feat: JWT 로그인 구현)
    - 타입: feat, fix, refactor, docs, test, chore, style, perf

    [브랜치명]
    - 형식: <타입>/<이슈번호>-<작업-내용> (예: feature/12-jwt-login)
    - 작업 내용은 소문자 + 하이픈 연결, 영어로 작성

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - develop
      - main

chat:
  auto_reply: true
